services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "13000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/data/vault.db
      # VAULT_ENCRYPTION_KEY is auto-generated on first run and persisted in vault-data volume.
      # Uncomment to provide your own key:
      # - VAULT_ENCRYPTION_KEY=your-base64-encoded-32-byte-key
      - INIT_ADMIN_EMAIL=admin@plainvault.local
      - INIT_ADMIN_PASSWORD=plainvault-admin
    volumes:
      - vault-data:/app/prisma/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "13001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  vault-data:
    driver: local
